name: Lint And Release Plugin

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Tag to release (for example: v1.0.0). Defaults to plugin header version."
        required: false
        type: string

permissions:
  contents: write

jobs:
  lint-and-release:
    runs-on: ubuntu-latest
    env:
      PLUGIN_MAIN_FILE: recaptcha-woo.php
      PLUGIN_SLUG: recaptcha-woo
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"

      - name: Lint PHP files
        run: |
          mapfile -t php_files < <(git ls-files '*.php')
          if [ "${#php_files[@]}" -eq 0 ]; then
            echo "No PHP files found to lint."
            exit 0
          fi

          for php_file_path in "${php_files[@]}"; do
            php -l "$php_file_path"
          done

      - name: Read plugin version
        id: plugin_version
        run: |
          plugin_version="$(sed -n 's/^.*Version:[[:space:]]*//p' "${PLUGIN_MAIN_FILE}" | head -n 1 | xargs)"
          if [ -z "${plugin_version}" ]; then
            echo "Could not read plugin version from ${PLUGIN_MAIN_FILE}."
            exit 1
          fi

          if [ "${{ github.event_name }}" = "push" ]; then
            release_tag="${GITHUB_REF_NAME}"
          elif [ -n "${{ inputs.release_tag }}" ]; then
            release_tag="${{ inputs.release_tag }}"
          else
            release_tag="v${plugin_version}"
          fi

          zip_file_name="${PLUGIN_SLUG}-${plugin_version}.zip"
          zip_file_path="${RUNNER_TEMP}/${zip_file_name}"

          echo "plugin_version=${plugin_version}" >> "$GITHUB_OUTPUT"
          echo "release_tag=${release_tag}" >> "$GITHUB_OUTPUT"
          echo "zip_file_name=${zip_file_name}" >> "$GITHUB_OUTPUT"
          echo "zip_file_path=${zip_file_path}" >> "$GITHUB_OUTPUT"

      - name: Build plugin zip
        run: |
          package_root_path="${RUNNER_TEMP}/plugin-package"
          package_plugin_path="${package_root_path}/${PLUGIN_SLUG}"
          rm -rf "${package_root_path}"
          mkdir -p "${package_plugin_path}"

          rsync -a ./ "${package_plugin_path}/" \
            --exclude '.git/' \
            --exclude '.github/' \
            --exclude '.cursor/' \
            --exclude '.idea/' \
            --exclude '.vscode/' \
            --exclude 'node_modules/' \
            --exclude '*.zip'

          (
            cd "${package_root_path}"
            zip -r "${{ steps.plugin_version.outputs.zip_file_path }}" "${PLUGIN_SLUG}"
          )

      - name: Upload release zip
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.plugin_version.outputs.release_tag }}
          name: Release ${{ steps.plugin_version.outputs.release_tag }}
          generate_release_notes: true
          files: ${{ steps.plugin_version.outputs.zip_file_path }}
